<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>AI Branding Auditor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h1>AI Branding Auditor</h1>

<p th:text="${message}"></p>

<form action="/scan" method="post">

    <div class="mb-3">
        <label class="form-label">Repository Folder</label>

        <input
            class="form-control"
            type="text"
            name="folder"
            placeholder="C:\Projects\MyRepo">
    </div>

    <button class="btn btn-primary" type="submit">
        Scan Repository
    </button>

    <a href="/help" class="btn btn-secondary ms-2">
        Help
    </a>

    <div class="mt-4">
        <label class="form-label">Results</label>

        <textarea
            class="form-control"
            rows="18"
            readonly
            th:text="${result}">
        </textarea>
    </div>

</form>

</body>
</html>
